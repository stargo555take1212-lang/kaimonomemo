  .category-section{

  .item-list{ list-style:none; margin:0; padding: 4px 0; }

    display:flex; align-items:center; gap:10px;

  .item-row:last-child{ border-bottom:none; }

    width:24px; height:24px; border-radius:50%;

  @keyframes tearOff{

  .send-btn{
    width:46px; height:46px; border-radius: var(--radius-md);

    width:46px; height:46px; border-radius: var(--radius-md);

    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .star-btn:active{ transform: scale(0.92); }

  .fav-manage-list{ list-style:none; margin:0 0 6px; padding:0; }
  .fav-manage-list li{
    display:flex; align-items:center; gap:10px;
    padding:10px 4px; border-bottom:1px solid var(--line); font-size:14.5px;
  }

  .fav-manage-list li .del-x.disabled{ opacity:.35; pointer-events:none; }
  .fav-item-name{ flex:1; }
  .fav-order-btns{ display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
  .order-btn{
    font-size:11px; color:var(--ink-soft); padding:2px 5px; line-height:1;
    border:1px solid var(--line); border-radius:5px; background:var(--paper);
  }
  .order-btn.disabled{ opacity:.3; pointer-events:none; }
  .fav-add-form{ margin-top:14px; padding-top:14px; border-top:1px dashed var(--line); }
  .fav-add-form .input-row{ margin-top:6px; }

  /* モーダル */
  .overlay{
    position: fixed; inset:0; background: rgba(46,61,74,0.42);
    display:flex; align-items:flex-end; justify-content:center;
    z-index:100; opacity:0; pointer-events:none; transition: opacity .2s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .modal{
    background: var(--paper-raised);
    width:100%; max-width:560px;
    border-radius: 22px 22px 0 0;
    padding: 18px 20px calc(24px + var(--safe-bottom));
    transform: translateY(16px);
    transition: transform .22s ease;
    max-height: 82dvh; overflow-y:auto;
  }
  .overlay.show .modal{ transform: translateY(0); }
  .modal h2{ font-size:18px; margin: 2px 0 14px; }
  .modal label{ font-size:12px; color:var(--ink-soft); display:block; margin: 14px 0 6px; }
  .modal input[type=text], .modal input[type=url]{
    width:100%; border:1.5px solid var(--line); border-radius: var(--radius-sm);
    padding: 11px 12px; font-size:15px; font-family:inherit; background:var(--paper);
  }
  .swatches{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }

    width:30px; height:30px; border-radius:50%; border:2px solid transparent; cursor:pointer;
  }

  .modal .actions{ display:flex; gap:10px; margin-top:20px; }
  .btn{
    flex:1; padding:12px; border-radius: var(--radius-sm); border:none;
    font-size:15px; font-family:inherit; font-weight:700;
  }
  .btn.primary{ background: var(--accent); color:#fff; }
  .btn.ghost{ background: var(--paper); color: var(--ink-soft); }
  .btn.danger{ background: transparent; color: var(--danger); font-weight:400; font-size:13px; flex:none; }

  .status-line{ font-size:12.5px; color:var(--ink-soft); margin-top:4px; line-height:1.6; }
  .status-line a{ color: var(--accent); }
  .close-x{ position:absolute; top:14px; right:16px; color:var(--ink-soft); font-size:20px; }

  .picker-list{ list-style:none; margin:0; padding:0; }
  .picker-list li{

    font-size:13px; z-index:150; opacity:0; transition: all .25s ease; pointer-events:none;

<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <span class="title">買い物メモ</span>
      <span class="sub"><span id="syncDot"></span><span id="syncLabel">未設定</span></span>
    </div>
  </header>

  <div class="fav-wrap" id="favWrap" style="display:none;">
    <div class="fav-title">
      <span>⭐ よく使うもの</span>
      <span class="fav-manage-link" id="favManageLink">✎ 管理</span>
    </div>
    <div id="favGroups"></div>
  </div>

  <main id="main">
    <!-- カテゴリセクションはJSで描画 -->
  </main>

  <div class="footer-settings" id="footerSettings">⚙️ スプレッドシート連携の設定</div>

  <div class="composer">
    <div class="composer-inner">
      <div class="chip-row" id="chipRow"></div>
      <div class="input-row">
        <input type="text" id="itemInput" placeholder="なくなったもの (例: たまご)" maxlength="60">
        <button class="star-btn" id="starBtn" aria-label="よく使うものに登録">☆</button>
        <button class="send-btn" id="addBtn">＋</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 設定モーダル -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>設定</h2>
      <div class="close-x" data-close="settingsOverlay">✕</div>
    </div>
    <label for="gasUrl">Google Apps Script のウェブアプリ URL</label>
    <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="status-line" id="gasStatus">まだ接続されていません。セットアップ手順は README を参照してください。</div>
    <div class="actions">
      <button class="btn ghost" id="testConnBtn">接続テスト</button>
      <button class="btn primary" id="saveGasBtn">保存</button>
    </div>
  </div>
</div>

<!-- カテゴリ追加/編集モーダル -->
<div class="overlay" id="catOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="catModalTitle">お店を追加</h2>
      <div class="close-x" data-close="catOverlay">✕</div>
    </div>
    <label for="catNameInput">お店・カテゴリ名</label>
    <input type="text" id="catNameInput" placeholder="例: コンビニ" maxlength="20">
    <label>色</label>
    <div class="swatches" id="catSwatches"></div>
    <div class="actions">
      <button class="btn danger" id="deleteCatBtn" style="display:none;">このカテゴリを削除</button>
      <button class="btn primary" id="saveCatBtn" style="margin-left:auto;">保存</button>
    </div>
  </div>
</div>

<!-- よく使うもの管理モーダル -->
<div class="overlay" id="favOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>よく使うものを管理</h2>
      <div class="close-x" data-close="favOverlay">✕</div>

    <ul class="fav-manage-list" id="favManageList"></ul>

      <label for="favNameInput">追加する品名(上で選んだお店に登録されます)</label>
      <div class="input-row">
        <input type="text" id="favNameInput" placeholder="例: 醤油" maxlength="60">
        <button class="btn primary" id="saveFavBtn">登録する</button>
      </div>

</div>

<!-- 移動先ピッカー(ドラッグの代わりのタップ操作) -->
<div class="overlay" id="moveOverlay">

    <div class="modal-head">
      <h2>移動先を選ぶ</h2>
      <div class="close-x" data-close="moveOverlay">✕</div>
    </div>

  </div>
</div>

<script>
(function(){
  'use strict';

  var STORAGE_URL = 'tarinai_gas_url';
  var STORAGE_CACHE = 'tarinai_cache_v1';
  var STORAGE_COLLAPSED = 'tarinai_collapsed_v1';
  var PALETTE = ['#4C9A8B','#8B5FBF','#E8A33D','#3A7CA5','#C75146','#5C7A99'];

  var state = {
    categories: [],
    items: [],
    templates: [],
    selectedCategoryId: null,
  };
  var collapsedSet = new Set(JSON.parse(localStorage.getItem(STORAGE_COLLAPSED) || '[]'));
  var pollTimer = null;
  var editingCategoryId = null; // null = 追加モード

  /* ---------- DOM refs ---------- */
  var $main = document.getElementById('main');
  var $chipRow = document.getElementById('chipRow');
  var $itemInput = document.getElementById('itemInput');
  var $addBtn = document.getElementById('addBtn');
  var $toast = document.getElementById('toast');
  var $syncDot = document.getElementById('syncDot');
  var $syncLabel = document.getElementById('syncLabel');
  var $settingsBtn = document.getElementById('footerSettings');
  var $settingsOverlay = document.getElementById('settingsOverlay');
  var $gasUrl = document.getElementById('gasUrl');
  var $gasStatus = document.getElementById('gasStatus');
  var $testConnBtn = document.getElementById('testConnBtn');
  var $saveGasBtn = document.getElementById('saveGasBtn');
  var $catOverlay = document.getElementById('catOverlay');
  var $catModalTitle = document.getElementById('catModalTitle');
  var $catNameInput = document.getElementById('catNameInput');
  var $catSwatches = document.getElementById('catSwatches');
  var $saveCatBtn = document.getElementById('saveCatBtn');
  var $deleteCatBtn = document.getElementById('deleteCatBtn');
  var $moveOverlay = document.getElementById('moveOverlay');
  var $movePickerList = document.getElementById('movePickerList');
  var moveItemTargetId = null;
  var selectedSwatchColor = PALETTE[0];
  var $favWrap = document.getElementById('favWrap');
  var $favGroups = document.getElementById('favGroups');
  var $favManageLink = document.getElementById('favManageLink');
  $favManageLink.addEventListener('click', function(){ openFavManage(); });
  var $starBtn = document.getElementById('starBtn');
  var $favOverlay = document.getElementById('favOverlay');
  var $favManageList = document.getElementById('favManageList');
  var $favNameInput = document.getElementById('favNameInput');
  var $favTabRow = document.getElementById('favTabRow');
  var $saveFavBtn = document.getElementById('saveFavBtn');
  var selectedFavCategoryId = null;

  /* ---------- ユーティリティ ---------- */
  function toast(msg){
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ $toast.classList.remove('show'); }, 2600);
  }

  function openOverlay(id){ document.getElementById(id).classList.add('show'); }
  function closeOverlay(id){ document.getElementById(id).classList.remove('show'); }

  document.querySelectorAll('[data-close]').forEach(function(el){
    el.addEventListener('click', function(){ closeOverlay(el.getAttribute('data-close')); });
  });
  [$settingsOverlay, $catOverlay, $moveOverlay, $favOverlay].forEach(function(ov){
    ov.addEventListener('click', function(e){ if (e.target === ov) ov.classList.remove('show'); });
  });

  function getUrl(){ return localStorage.getItem(STORAGE_URL) || ''; }
  function setUrl(u){ localStorage.setItem(STORAGE_URL, u); }

  function saveCache(){
    localStorage.setItem(STORAGE_CACHE, JSON.stringify({categories: state.categories, items: state.items, templates: state.templates}));
  }
  function loadCache(){
    try{
      var c = JSON.parse(localStorage.getItem(STORAGE_CACHE) || 'null');
      if (c){ state.categories = c.categories || []; state.items = c.items || []; state.templates = c.templates || []; }
    }catch(e){}
  }
  function saveCollapsed(){ localStorage.setItem(STORAGE_COLLAPSED, JSON.stringify(Array.from(collapsedSet))); }

  function nextPaletteColor(){
    var used = state.categories.map(function(c){ return c.color; });
    for (var i=0;i<PALETTE.length;i++){ if (used.indexOf(PALETTE[i]) === -1) return PALETTE[i]; }
    return PALETTE[state.categories.length % PALETTE.length];
  }

  function setSyncState(mode){ // 'ok' | 'err' | 'none'
    $syncDot.className = mode === 'ok' ? 'ok' : (mode === 'err' ? 'err' : '');
    $syncLabel.textContent = mode === 'ok' ? '同期済み' : (mode === 'err' ? '同期エラー' : (getUrl() ? '未同期' : '未設定'));
  }

  /* ---------- API ---------- */
  function apiGet(){
    var url = getUrl();
    if (!url) return Promise.reject(new Error('URL未設定'));
    return fetch(url, { method: 'GET' }).then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }
  function apiPost(action, payload){
    var url = getUrl();
    if (!url) return Promise.reject(new Error('URL未設定'));
    var body = Object.assign({ action: action }, payload || {});
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    }).then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    }).then(function(j){
      if (j && j.error) throw new Error(j.error);
      return j;
    });
  }

  var pendingRemovals = {};
  var pendingAdds = {};

  function applyServerData(data){
    if (!data) return;
    if (data.categories) state.categories = data.categories;
    if (data.items) {
      var items = data.items.filter(function(it){ return !pendingRemovals[it.id]; });
      Object.keys(pendingAdds).forEach(function(tempId){ items.push(pendingAdds[tempId]); });
      state.items = items;
    }
    if (data.templates) state.templates = data.templates;
    saveCache();
  }

  function refresh(){
    if (!getUrl()) { setSyncState('none'); render(); return Promise.resolve(); }
    return apiGet().then(function(data){
      applyServerData(data);
      setSyncState('ok');
      render();
    }).catch(function(err){
      setSyncState('err');
      console.warn('refresh failed', err);
    });
  }

  function mutate(action, payload){
    return apiPost(action, payload).then(function(res){
      applyServerData(res);
      setSyncState('ok');
      render();
      return res;
    }).catch(function(err){
      setSyncState('err');
      toast('同期に失敗しました: ' + (err && err.message ? err.message : err));
      console.warn(action, err);
      throw err;
    });
  }

  /* ---------- レンダリング ---------- */
  function categoryById(id){ return state.categories.find(function(c){ return c.id === id; }); }

  function render(){
    renderChips();
    renderMain();
    renderFavBar();
  }

  function renderFavBar(){
    if (state.categories.length === 0){
      $favWrap.style.display = 'none';
      return;
    }
    $favWrap.style.display = '';
    $favGroups.innerHTML = '';
    state.categories.forEach(function(cat){
      var tpls = state.templates.filter(function(t){ return t.categoryId === cat.id; });
      if (!tpls.length) return;
      var group = document.createElement('div');
      group.className = 'fav-group';

      var label = document.createElement('div');
      label.className = 'fav-group-title';
      label.innerHTML = '<span class="cat-dot" style="background:' + cat.color + '"></span>' + escapeHtml(cat.name);
      group.appendChild(label);

      var row = document.createElement('div');
      row.className = 'fav-row';
      tpls.forEach(function(tpl){
        var chip = document.createElement('div');
        chip.className = 'fav-chip';
        chip.style.setProperty('--cat-color', cat.color);
        chip.innerHTML = '<span class="cat-dot"></span>' + escapeHtml(tpl.name);
        chip.addEventListener('click', function(){ quickAddFromTemplate(tpl); });
        row.appendChild(chip);
      });
      group.appendChild(row);
      $favGroups.appendChild(group);
    });
  }

  function quickAddFromTemplate(tpl){
    if (!getUrl()){ toast('設定からGoogle Apps ScriptのURLを登録してください'); openOverlay('settingsOverlay'); return; }
    var cat = categoryById(tpl.categoryId);
    if (!cat){ toast('このカテゴリは削除されています'); return; }
    var tempId = 'tmp_' + Date.now();
    var tempItem = { id: tempId, name: tpl.name, categoryId: tpl.categoryId, status: 'active' };
    pendingAdds[tempId] = tempItem;
    state.items.push(tempItem);
    render();
    toast('追加しました: ' + tpl.name);
    mutate('addItem', { name: tpl.name, categoryId: tpl.categoryId }).catch(function(){}).then(function(){
      delete pendingAdds[tempId];
      state.items = state.items.filter(function(it){ return it.id !== tempId; });
      render();
    });
  }

  function renderChips(){
    $chipRow.innerHTML = '';
    if (!state.selectedCategoryId || !categoryById(state.selectedCategoryId)){
      state.selectedCategoryId = state.categories[0] ? state.categories[0].id : null;
    }
    state.categories.forEach(function(cat){
      var chip = document.createElement('div');
      chip.className = 'chip' + (cat.id === state.selectedCategoryId ? ' selected' : '');
      chip.style.setProperty('--cat-color', cat.color);
      chip.innerHTML = '<span class="cat-dot"></span>' + escapeHtml(cat.name);
      chip.addEventListener('click', function(){
        state.selectedCategoryId = cat.id;
        renderChips();
        $itemInput.focus();
      });
      chip.addEventListener('contextmenu', function(e){ e.preventDefault(); openCategoryModal(cat.id); });
      var pressTimer;
      chip.addEventListener('pointerdown', function(){ pressTimer = setTimeout(function(){ openCategoryModal(cat.id); }, 480); });
      chip.addEventListener('pointerup', function(){ clearTimeout(pressTimer); });
      chip.addEventListener('pointerleave', function(){ clearTimeout(pressTimer); });
      $chipRow.appendChild(chip);
    });
    var addChip = document.createElement('div');
    addChip.className = 'chip add-chip';
    addChip.textContent = '＋ お店を追加';
    addChip.addEventListener('click', function(){ openCategoryModal(null); });
    $chipRow.appendChild(addChip);
  }

  function renderMain(){
    $main.innerHTML = '';

    if (state.categories.length === 0){
      var empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = '<span class="emoji">🧺</span>まだお店・カテゴリがありません<br>「スーパー」「薬局」など、買いに行く場所を登録しましょう<br><button id="emptyAddCat">お店を追加</button>';
      $main.appendChild(empty);
      document.getElementById('emptyAddCat').addEventListener('click', function(){ openCategoryModal(null); });
      return;
    }

    state.categories.forEach(function(cat){
      var items = state.items.filter(function(it){ return it.categoryId === cat.id; });
      var section = document.createElement('section');
      section.className = 'category-section' + (collapsedSet.has(cat.id) ? ' collapsed' : '');
      section.style.setProperty('--cat-color', cat.color);
      section.dataset.categoryId = cat.id;

      var header = document.createElement('div');
      header.className = 'cat-header';
      header.innerHTML =
        '<span class="cat-dot"></span>' +
        '<span class="cat-name">' + escapeHtml(cat.name) + '</span>' +
        '<span class="cat-count">' + items.length + '</span>' +
        '<span class="cat-edit-btn">✎</span>' +
        '<span class="cat-caret">▾</span>';
      header.addEventListener('click', function(e){
        if (e.target.classList.contains('cat-edit-btn')) { openCategoryModal(cat.id); return; }
        if (collapsedSet.has(cat.id)) collapsedSet.delete(cat.id); else collapsedSet.add(cat.id);
        saveCollapsed();
        section.classList.toggle('collapsed');
      });
      section.appendChild(header);

      var list = document.createElement('ul');
      list.className = 'item-list';
      if (items.length === 0){
        var li = document.createElement('li');
        li.style.cssText = 'padding:16px 14px;color:var(--ink-soft);font-size:13.5px;';
        li.textContent = 'なくなったものはありません';
        list.appendChild(li);
      } else {
        items.forEach(function(it){ list.appendChild(renderItemRow(it, cat)); });
      }
      section.appendChild(list);
      $main.appendChild(section);
    });
  }

  function renderItemRow(item, cat){
    var li = document.createElement('li');
    li.className = 'item-row';
    li.dataset.id = item.id;
    li.style.setProperty('--cat-color', cat.color);
    li.innerHTML =
      '<span class="checkbox">✓</span>' +
      '<span class="item-name">' + escapeHtml(item.name) + '</span>' +
      '<span class="drag-handle">⠿⠿</span>';

    li.querySelector('.checkbox').addEventListener('click', function(){ handleCheck(item); });
    li.querySelector('.item-name').addEventListener('click', function(){ openMovePicker(item); });

    var handle = li.querySelector('.drag-handle');
    attachDrag(handle, li, item);
    return li;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  /* ---------- アイテム追加 ---------- */
  function addItemFromInput(){
    var name = $itemInput.value.trim();
    if (!name) return;
    if (!state.selectedCategoryId){
      toast('先にお店・カテゴリを追加してください');
      openCategoryModal(null);
      return;
    }
    if (!getUrl()){
      toast('設定からGoogle Apps ScriptのURLを登録してください');
      openOverlay('settingsOverlay');
      return;
    }
    var catId = state.selectedCategoryId;
    var tempId = 'tmp_' + Date.now();
    var tempItem = { id: tempId, name: name, categoryId: catId, status: 'active' };
    pendingAdds[tempId] = tempItem;
    state.items.push(tempItem);
    render();
    $itemInput.value = '';
    mutate('addItem', { name: name, categoryId: catId }).catch(function(){}).then(function(){
      delete pendingAdds[tempId];
      state.items = state.items.filter(function(it){ return it.id !== tempId; });
      render();
    });
  }
  $addBtn.addEventListener('click', addItemFromInput);
  $itemInput.addEventListener('keydown', function(e){ if (e.key === 'Enter') addItemFromInput(); });

  /* ---------- チェック(購入済み) ---------- */
  function handleCheck(item){
    var row = $main.querySelector('.item-row[data-id="' + cssEscape(item.id) + '"]');
    if (row) row.classList.add('checked');
    pendingRemovals[item.id] = true;
    setTimeout(function(){
      state.items = state.items.filter(function(it){ return it.id !== item.id; });
      saveCache();
      render();
    }, 380);
    mutate('checkItem', { id: item.id }).catch(function(){}).then(function(){
      delete pendingRemovals[item.id];
    });
  }

  function cssEscape(s){ return String(s).replace(/["\\]/g, '\\$&'); }

  /* ---------- 移動(タップ版ピッカー) ---------- */
  function openMovePicker(item){
    moveItemTargetId = item.id;
    $movePickerList.innerHTML = '';
    state.categories.forEach(function(cat){
      var li = document.createElement('li');
      li.innerHTML = '<span class="cat-dot" style="background:' + cat.color + '"></span>' + escapeHtml(cat.name) + (cat.id === item.categoryId ? '　(現在)' : '');
      li.addEventListener('click', function(){
        closeOverlay('moveOverlay');
        if (cat.id === item.categoryId) return;
        item.categoryId = cat.id; // optimistic
        render();
        mutate('moveItem', { id: item.id, categoryId: cat.id }).catch(function(){});
      });
      $movePickerList.appendChild(li);
    });
    openOverlay('moveOverlay');
  }

  /* ---------- ドラッグで振り分け ---------- */
  function attachDrag(handle, row, item){
    var ghost = null;
    var activePointerId = null;

    handle.addEventListener('pointerdown', function(e){
      e.preventDefault();
      activePointerId = e.pointerId;
      row.classList.add('dragging');
      ghost = document.createElement('div');
      ghost.className = 'drag-ghost';
      ghost.textContent = item.name;
      document.body.appendChild(ghost);
      positionGhost(e.clientX, e.clientY);

      // 指がハンドルから離れても追跡できるよう、window全体でmove/up/cancelを監視する
      // (スマホによってはsetPointerCaptureが効かず、ハンドル上でしかイベントを拾えないと
      //  ゴースト表示が消えないまま残ってしまうことがあるため)
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onUp);
    });

    function positionGhost(x, y){
      if (!ghost) return;
      ghost.style.left = x + 'px';
      ghost.style.top = y + 'px';
    }

    function onMove(e){
      if (e.pointerId !== activePointerId || !ghost) return;
      positionGhost(e.clientX, e.clientY);
      document.querySelectorAll('.category-section.drop-hover').forEach(function(s){ s.classList.remove('drop-hover'); });
      var el = document.elementFromPoint(e.clientX, e.clientY);
      var section = el ? el.closest('.category-section') : null;
      if (section) section.classList.add('drop-hover');
    }

    function onUp(e){
      if (e.pointerId !== activePointerId) return;
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      window.removeEventListener('pointercancel', onUp);
      activePointerId = null;
      row.classList.remove('dragging');
      var el = document.elementFromPoint(e.clientX, e.clientY);
      var section = el ? el.closest('.category-section') : null;
      document.querySelectorAll('.category-section.drop-hover').forEach(function(s){ s.classList.remove('drop-hover'); });
      if (ghost) { ghost.remove(); ghost = null; }
      if (section){
        var newCatId = section.dataset.categoryId;
        if (newCatId && newCatId !== item.categoryId){
          item.categoryId = newCatId;
          render();
          mutate('moveItem', { id: item.id, categoryId: newCatId }).catch(function(){});
        }
      }
    }
  }

  /* ---------- カテゴリ追加/編集モーダル ---------- */
  function openCategoryModal(catId){
    editingCategoryId = catId;
    var cat = catId ? categoryById(catId) : null;
    $catModalTitle.textContent = cat ? 'お店を編集' : 'お店を追加';
    $catNameInput.value = cat ? cat.name : '';
    selectedSwatchColor = cat ? cat.color : nextPaletteColor();
    renderSwatches();
    $deleteCatBtn.style.display = cat ? 'inline-block' : 'none';
    openOverlay('catOverlay');
    setTimeout(function(){ $catNameInput.focus(); }, 100);
  }

  function renderSwatches(){
    $catSwatches.innerHTML = '';
    PALETTE.forEach(function(color){
      var sw = document.createElement('div');
      sw.className = 'swatch' + (color === selectedSwatchColor ? ' selected' : '');
      sw.style.background = color;
      sw.addEventListener('click', function(){ selectedSwatchColor = color; renderSwatches(); });
      $catSwatches.appendChild(sw);
    });
  }

  $saveCatBtn.addEventListener('click', function(){
    var name = $catNameInput.value.trim();
    if (!name){ toast('名前を入力してください'); return; }
    if (!getUrl()){ toast('先に設定からURLを登録してください'); openOverlay('settingsOverlay'); return; }
    if (editingCategoryId){
      mutate('updateCategory', { id: editingCategoryId, name: name, color: selectedSwatchColor }).then(function(){
        closeOverlay('catOverlay');
      });
    } else {
      mutate('addCategory', { name: name, color: selectedSwatchColor }).then(function(res){
        closeOverlay('catOverlay');
        if (res && res.categories && res.categories.length){
          state.selectedCategoryId = res.categories[res.categories.length-1].id;
          renderChips();
        }
      });
    }
  });

  $deleteCatBtn.addEventListener('click', function(){
    if (!editingCategoryId) return;
    if (!confirm('このカテゴリを削除しますか？')) return;
    mutate('deleteCategory', { id: editingCategoryId }).then(function(){
      closeOverlay('catOverlay');
    }).catch(function(err){
      toast(String(err.message || err));
    });
  });

  /* ---------- よく使うもの管理 ---------- */
  function openFavManage(prefillName){
    selectedFavCategoryId = state.selectedCategoryId || (state.categories[0] && state.categories[0].id) || null;
    $favNameInput.value = prefillName || '';
    renderFavTabs();
    renderFavManageList();
    openOverlay('favOverlay');
    if (prefillName){ setTimeout(function(){ $favNameInput.focus(); }, 100); }
  }

  function renderFavTabs(){
    $favTabRow.innerHTML = '';
    state.categories.forEach(function(cat){
      var chip = document.createElement('div');
      chip.className = 'chip' + (cat.id === selectedFavCategoryId ? ' selected' : '');
      chip.style.setProperty('--cat-color', cat.color);
      chip.innerHTML = '<span class="cat-dot"></span>' + escapeHtml(cat.name);
      chip.addEventListener('click', function(){
        selectedFavCategoryId = cat.id;
        renderFavTabs();
        renderFavManageList();
      });
      $favTabRow.appendChild(chip);
    });
  }

  function renderFavManageList(){
    $favManageList.innerHTML = '';
    var tpls = state.templates.filter(function(t){ return t.categoryId === selectedFavCategoryId; });
    if (!tpls.length){
      var empty = document.createElement('li');
      empty.style.color = 'var(--ink-soft)';
      empty.style.fontSize = '13.5px';
      empty.textContent = 'このお店にはまだ登録されていません。下のフォームから追加できます';
      $favManageList.appendChild(empty);
      return;
    }
    tpls.forEach(function(tpl, idx){
      var li = document.createElement('li');
      li.innerHTML =
        '<span class="fav-order-btns">' +
          '<span class="order-btn up' + (idx === 0 ? ' disabled' : '') + '">▲</span>' +
          '<span class="order-btn down' + (idx === tpls.length - 1 ? ' disabled' : '') + '">▼</span>' +
        '</span>' +
        '<span class="fav-item-name">' + escapeHtml(tpl.name) + '</span>' +
        '<span class="del-x">✕</span>';
      if (idx > 0){
        li.querySelector('.up').addEventListener('click', function(){ swapTemplateOrder(tpl, tpls[idx - 1]); });
      }
      if (idx < tpls.length - 1){
        li.querySelector('.down').addEventListener('click', function(){ swapTemplateOrder(tpl, tpls[idx + 1]); });
      }
      var delBtn = li.querySelector('.del-x');
      delBtn.addEventListener('click', function(){
        if (delBtn.classList.contains('disabled')) return;
        delBtn.classList.add('disabled');
        li.style.opacity = '.4';
        mutate('deleteTemplate', { id: tpl.id }).then(function(){
          renderFavManageList();
        }).catch(function(){
          delBtn.classList.remove('disabled');
          li.style.opacity = '';
        });
      });
      $favManageList.appendChild(li);
    });
  }

  function swapTemplateOrder(a, b){
    var ia = state.templates.indexOf(a);
    var ib = state.templates.indexOf(b);
    state.templates[ia] = b;
    state.templates[ib] = a;
    var orderA = a.order, orderB = b.order;
    a.order = orderB;
    b.order = orderA;
    renderFavManageList();
    renderFavBar();
    mutate('swapTemplateOrder', { idA: a.id, idB: b.id }).then(function(){
      renderFavManageList();
    }).catch(function(){
      state.templates[ia] = a;
      state.templates[ib] = b;
      a.order = orderA;
      b.order = orderB;
      renderFavManageList();
      renderFavBar();
    });
  }

  $saveFavBtn.addEventListener('click', function(){
    var name = $favNameInput.value.trim();
    if (!name){ toast('品名を入力してください'); return; }
    if (!selectedFavCategoryId){ toast('お店・カテゴリを選んでください'); return; }
    if (!getUrl()){ toast('先に設定からURLを登録してください'); openOverlay('settingsOverlay'); return; }
    $saveFavBtn.disabled = true;
    $saveFavBtn.textContent = '登録中…';
    mutate('addTemplate', { name: name, categoryId: selectedFavCategoryId }).then(function(){
      $favNameInput.value = '';
      renderFavManageList();
      toast('「' + name + '」を登録しました');
    }).catch(function(){}).then(function(){
      $saveFavBtn.disabled = false;
      $saveFavBtn.textContent = '登録する';
    });
  });

  $starBtn.addEventListener('click', function(){
    if (state.categories.length === 0){
      toast('先にお店・カテゴリを追加してください');
      openCategoryModal(null);
      return;
    }
    var name = $itemInput.value.trim();
    openFavManage(name);
  });

  /* ---------- 設定モーダル ---------- */
  $settingsBtn.addEventListener('click', function(){
    $gasUrl.value = getUrl();
    $gasStatus.textContent = getUrl() ? '設定済みです。' : 'まだ接続されていません。README のセットアップ手順を参照してください。';
    openOverlay('settingsOverlay');
  });

  $testConnBtn.addEventListener('click', function(){
    var u = $gasUrl.value.trim();
    if (!u){ $gasStatus.textContent = 'URLを入力してください'; return; }
    $gasStatus.textContent = '接続確認中…';
    fetch(u).then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).then(function(data){
      $gasStatus.textContent = '接続成功！カテゴリ ' + (data.categories||[]).length + ' 件、アイテム ' + (data.items||[]).length + ' 件を確認しました。';
    }).catch(function(err){
      $gasStatus.textContent = '接続に失敗しました: ' + err.message + '（URLやデプロイ設定「アクセスできるユーザー: 全員」を確認してください）';
    });
  });

  $saveGasBtn.addEventListener('click', function(){
    var u = $gasUrl.value.trim();
    setUrl(u);
    closeOverlay('settingsOverlay');
    toast(u ? '保存しました。同期します…' : 'URLをクリアしました');
    refresh();
    resetPolling();
  });

  /* ---------- ポーリング同期 ---------- */
  function resetPolling(){
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(function(){
      if (document.visibilityState === 'visible') refresh();
    }, 20000);
  }
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible') refresh();
  });

  /* ---------- 初期化 ---------- */
  // 招待リンク(?gas=...)でURLが渡された場合は自動で保存し、アドレスバーからは消す
  (function applyInviteLink(){
    var gasParam = new URLSearchParams(location.search).get('gas');
    if (gasParam) {
      setUrl(gasParam);
      history.replaceState(null, '', location.pathname);
    }
  })();

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
  loadCache();
  render();
  setSyncState(getUrl() ? 'none' : 'none');
  if (!getUrl()){
    setTimeout(function(){
      toast('はじめに設定からGoogle Apps ScriptのURLを登録してください');
    }, 700);
  }
  refresh();
  resetPolling();

})();

</script>
</body>
